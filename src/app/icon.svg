<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C252"/>
      <stop offset="50%" style="stop-color:#D4A843"/>
      <stop offset="100%" style="stop-color:#A67C2E"/>
    </linearGradient>
    <linearGradient id="blade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C8D6E5"/>
      <stop offset="100%" style="stop-color:#8395A7"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#0A0E14" stroke="url(#gold)" stroke-width="1.5"/>
  <!-- Sword blade -->
  <path d="M16 5 L18 17 L16 19 L14 17 Z" fill="url(#blade)" opacity="0.9"/>
  <!-- Sword guard (crossguard) -->
  <rect x="11" y="18" width="10" height="2.5" rx="1" fill="url(#gold)"/>
  <!-- Sword grip -->
  <rect x="14.5" y="20.5" width="3" height="4" rx="0.5" fill="url(#gold)" opacity="0.8"/>
  <!-- Sword pommel -->
  <circle cx="16" cy="26" r="1.5" fill="url(#gold)"/>
  <!-- Subtle diamond accent on blade -->
  <path d="M16 8 L17 11 L16 14 L15 11 Z" fill="url(#gold)" opacity="0.3"/>
</svg>
