<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>LevelRise Brand Preview</title>
    <style>
      body {
        background: #0b0f17;
        color: #e5e7eb;
        font-family: sans-serif;
        padding: 40px;
      }
      h1 {
        color: #ffd700;
      }
      h2 {
        color: #94a3b8;
        margin-top: 40px;
      }
      .preview {
        background: #121826;
        border: 1px solid #2a3447;
        border-radius: 12px;
        padding: 32px;
        margin: 16px 0;
        display: inline-block;
      }
      .row {
        display: flex;
        gap: 40px;
        align-items: center;
        flex-wrap: wrap;
      }
      .light {
        background: #f8fafc;
      }
    </style>
  </head>
  <body>
    <h1>LevelRise — Brand SVG Preview</h1>

    <h2>1. Logo Mark (64×64)</h2>
    <div class="row">
      <div class="preview">
        <img src="public/brand/mark.svg" width="64" height="64" alt="Mark 64" />
      </div>
      <div class="preview">
        <img src="public/brand/mark.svg" width="128" height="128" alt="Mark 128" />
      </div>
      <div class="preview">
        <img src="public/brand/mark.svg" width="256" height="256" alt="Mark 256" />
      </div>
    </div>

    <h2>2. Wordmark (320×64)</h2>
    <div class="row">
      <div class="preview">
        <img src="public/brand/wordmark.svg" width="320" height="64" alt="Wordmark" />
      </div>
    </div>

    <h2>3. Favicon (64×64)</h2>
    <div class="row">
      <div class="preview">
        <img src="public/brand/favicon.svg" width="32" height="32" alt="Favicon 32" />
      </div>
      <div class="preview">
        <img src="public/brand/favicon.svg" width="64" height="64" alt="Favicon 64" />
      </div>
      <div class="preview">
        <img src="public/brand/favicon.svg" width="128" height="128" alt="Favicon 128" />
      </div>
    </div>

    <h2>4. On Light Background</h2>
    <div class="row">
      <div class="preview light">
        <img src="public/brand/mark.svg" width="128" height="128" alt="Mark on light" />
      </div>
      <div class="preview light">
        <img src="public/brand/favicon.svg" width="64" height="64" alt="Favicon on light" />
      </div>
    </div>
  </body>
</html>
