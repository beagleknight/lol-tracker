version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    # Group ALL updates (minor, patch, AND major) into a single PR.
    # Major bumps are reviewed manually before merging; the auto-merge
    # workflow skips PRs with the semver-major label.
    groups:
      all-dependencies:
        update-types:
          - major
          - minor
          - patch
    open-pull-requests-limit: 5
    reviewers:
      - beagleknight
    labels:
      - dependencies
      - skip-changelog

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      all-actions:
        update-types:
          - major
          - minor
          - patch
    labels:
      - dependencies
      - github-actions
      - skip-changelog
