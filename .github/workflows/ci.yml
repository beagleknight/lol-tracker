name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            app:
              - "src/**"
              - "tests/**"
              - "package.json"
              - "package-lock.json"
              - "tsconfig.json"
              - "next.config.ts"
              - ".tool-versions"
              - "playwright.config.ts"
              - "drizzle/**"
              - "scripts/**"
              - "messages/**"
              - "public/**"
              - ".github/workflows/ci.yml"

  typecheck:
    name: Typecheck
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".tool-versions"
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".tool-versions"
          cache: npm
      - run: npm ci
      - run: npm run lint

  format:
    name: Format
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".tool-versions"
          cache: npm
      - run: npm ci
      - run: npm run fmt:check

  build:
    name: Build
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    env:
      # Stub values so next build compiles without real credentials.
      # Auth.js requires AUTH_SECRET at build time; everything else is lazy.
      AUTH_SECRET: ci-placeholder-secret-not-real
      NEXT_PUBLIC_CANNY_BOARD_TOKEN: test-board-token
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".tool-versions"
          cache: npm
      - run: npm ci
      - run: npm run build

  smoke:
    name: Smoke Tests
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    env:
      AUTH_SECRET: smoke-test-secret-at-least-32-characters
      AUTH_TRUST_HOST: "true"
      NEXT_PUBLIC_DEMO_MODE: "true"
      TURSO_DATABASE_URL: "file:./data/lol-tracker.db"
      NEXT_PUBLIC_CANNY_BOARD_TOKEN: test-board-token
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".tool-versions"
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
      - name: Build app
        run: npm run build
      - name: Run smoke tests
        run: npm run test:smoke
      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-test-report
          path: playwright-report/
          retention-days: 7

  e2e:
    name: E2E Tests
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    env:
      AUTH_SECRET: smoke-test-secret-at-least-32-characters
      AUTH_TRUST_HOST: "true"
      NEXT_PUBLIC_DEMO_MODE: "true"
      TURSO_DATABASE_URL: "file:./data/lol-tracker.db"
      NEXT_PUBLIC_CANNY_BOARD_TOKEN: test-board-token
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".tool-versions"
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
      - name: Build app
        run: npm run build
      - name: Run E2E tests
        run: npm run test:e2e
      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-report
          path: playwright-report/
          retention-days: 7

  changelog:
    name: Changelog
    runs-on: ubuntu-latest
    # Skip this check if the PR has the 'skip-changelog' label
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-changelog') }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check for changelog entry
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD -- 'changelog/')
          if [ -z "$CHANGED" ]; then
            echo "::error::No changelog entry found. Every PR must include a changelog file under changelog/. Add a 'skip-changelog' label to bypass this check."
            exit 1
          fi
          echo "Changelog files changed:"
          echo "$CHANGED"

  audit:
    name: Security audit
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".tool-versions"
          cache: npm
      - run: npm ci
      - name: Check for high/critical vulnerabilities (production)
        run: npm audit --omit=dev --audit-level=high
