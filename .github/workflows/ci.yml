name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      # Stub values so next build compiles without real credentials.
      # Auth.js requires AUTH_SECRET at build time; everything else is lazy.
      AUTH_SECRET: ci-placeholder-secret-not-real
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    env:
      AUTH_SECRET: smoke-test-secret-at-least-32-characters
      NEXT_PUBLIC_DEMO_MODE: "true"
      TURSO_DATABASE_URL: "file:./data/lol-tracker.db"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
      - name: Build app
        run: npm run build
      - name: Run smoke tests
        run: npm run test:smoke
      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report
          path: playwright-report/
          retention-days: 7

  changelog:
    name: Changelog
    runs-on: ubuntu-latest
    # Skip this check if the PR has the 'skip-changelog' label
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-changelog') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for changelog entry
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD -- 'changelog/')
          if [ -z "$CHANGED" ]; then
            echo "::error::No changelog entry found. Every PR must include a changelog file under changelog/. Add a 'skip-changelog' label to bypass this check."
            exit 1
          fi
          echo "Changelog files changed:"
          echo "$CHANGED"
